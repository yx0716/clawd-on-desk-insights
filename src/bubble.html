<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  user-select: none;
  font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

.card {
  position: absolute;
  top: 8px; left: 8px; right: 8px; bottom: 8px;
  background: #ffffff;
  border-radius: 14px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.08);
  opacity: 0;
  transform: translateY(10px) scale(0.95);
  transition: opacity 0.2s ease-out, transform 0.2s ease-out;
  overflow: hidden;
}
.card.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}
.card.hiding {
  opacity: 0;
  transform: translateY(10px) scale(0.95);
}

/* ── Tool pill ── */
.tool-pill {
  display: inline-flex;
  align-items: center;
  align-self: flex-start;
  padding: 3px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  letter-spacing: 0.02em;
  background: #6b7280;
}
.tool-pill[data-tool="Bash"]  { background: #f97316; }
.tool-pill[data-tool="Edit"]  { background: #3b82f6; }
.tool-pill[data-tool="Write"] { background: #8b5cf6; }
.tool-pill[data-tool="Read"]  { background: #22c55e; }
.tool-pill[data-tool="Glob"]  { background: #06b6d4; }
.tool-pill[data-tool="Grep"]  { background: #06b6d4; }
.tool-pill[data-tool="Agent"] { background: #ec4899; }

/* ── Command block ── */
.command-block {
  padding: 8px 12px;
  background: #f3f4f6;
  border-radius: 8px;
  font-family: "SF Mono", "Cascadia Code", "Fira Code", "Consolas", monospace;
  font-size: 12px;
  color: #374151;
  line-height: 1.4;
  max-height: 52px;
  overflow: hidden;
  word-break: break-all;
}

/* ── Action buttons ── */
.actions {
  display: flex;
  gap: 8px;
}
.btn {
  flex: 1;
  padding: 9px 0;
  border-radius: 10px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: 2px solid transparent;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  outline: none;
}
.btn:active:not(:disabled) { transform: scale(0.97); }
.btn:disabled { opacity: 0.5; cursor: default; }

.btn-allow {
  background: #f97316;
  color: #fff;
  border-color: #f97316;
}
.btn-allow:hover:not(:disabled) { background: #ea580c; border-color: #ea580c; }

.btn-deny {
  background: #fff;
  color: #6b7280;
  border-color: #d1d5db;
}
.btn-deny:hover:not(:disabled) { border-color: #9ca3af; color: #374151; }

/* ── Suggestion buttons (dynamic) ── */
.suggestions { display: flex; flex-direction: column; gap: 6px; }

.btn-suggestion {
  display: block;
  width: 100%;
  padding: 8px 12px;
  background: #fff;
  color: #9ca3af;
  border: 1.5px solid #e5e7eb;
  border-radius: 10px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, transform 0.1s;
  outline: none;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.btn-suggestion:hover:not(:disabled) { border-color: #9ca3af; color: #6b7280; }
.btn-suggestion:active:not(:disabled) { transform: scale(0.98); }
.btn-suggestion:disabled { opacity: 0.5; cursor: default; }
</style>
</head>
<body>
<div class="card" id="card">
  <span class="tool-pill" id="toolPill"></span>
  <div class="command-block" id="commandBlock"></div>
  <div class="actions">
    <button class="btn btn-allow" id="btnAllow">Allow</button>
    <button class="btn btn-deny" id="btnDeny">Deny</button>
  </div>
  <div class="suggestions" id="suggestions"></div>
</div>

<script>
const card = document.getElementById("card");
const toolPill = document.getElementById("toolPill");
const commandBlock = document.getElementById("commandBlock");
const btnAllow = document.getElementById("btnAllow");
const btnDeny = document.getElementById("btnDeny");
const suggestionsContainer = document.getElementById("suggestions");

function formatDetail(name, input) {
  if (!input || typeof input !== "object") return "";
  if (name === "Bash" && input.command) return truncate(input.command, 120);
  if ((name === "Edit" || name === "Write" || name === "Read") && input.file_path)
    return truncate(input.file_path, 120);
  if ((name === "Glob" || name === "Grep") && input.pattern)
    return truncate(input.pattern, 120);
  for (const v of Object.values(input)) {
    if (typeof v === "string") return truncate(v, 100);
  }
  return truncate(JSON.stringify(input), 100);
}

function truncate(s, max) {
  if (s.length <= max) return s;
  return s.slice(0, max - 1) + "\u2026";
}

function getSuggestionLabel(s, lang) {
  if (s.type === "setMode") {
    if (s.mode === "acceptEdits") return lang === "zh" ? "\u81EA\u52A8\u63A5\u53D7\u7F16\u8F91" : "Auto-accept edits";
    if (s.mode === "plan") return lang === "zh" ? "\u5207\u6362\u5230 Plan \u6A21\u5F0F" : "Switch to plan mode";
    return s.mode;
  }
  if (s.type === "addRules" && s.ruleContent) {
    if (s.ruleContent.includes("**")) {
      // Glob pattern — show directory name
      const dir = s.ruleContent.split("**")[0].replace(/\/$/, "").split("/").pop() || s.ruleContent;
      const label = lang === "zh" ? `\u5141\u8BB8 ${s.toolName || ""} \u5728 ${dir}/` : `Allow ${s.toolName || ""} in ${dir}/`;
      return label;
    }
    const short = s.ruleContent.length > 30 ? s.ruleContent.slice(0, 29) + "\u2026" : s.ruleContent;
    return lang === "zh" ? `\u59CB\u7EC8\u5141\u8BB8 \`${short}\`` : `Always allow \`${short}\``;
  }
  return lang === "zh" ? "\u59CB\u7EC8\u5141\u8BB8" : "Always allow";
}

function disableAll() {
  btnAllow.disabled = true;
  btnDeny.disabled = true;
  for (const btn of suggestionsContainer.children) btn.disabled = true;
}

function show(data) {
  // Tool pill
  toolPill.textContent = data.toolName || "Unknown";
  toolPill.setAttribute("data-tool", data.toolName || "");

  // Command block (textContent only — never innerHTML)
  commandBlock.textContent = formatDetail(data.toolName, data.toolInput);

  // Button labels
  btnAllow.textContent = data.lang === "zh" ? "\u6279\u51C6" : "Allow";
  btnDeny.textContent = data.lang === "zh" ? "\u62D2\u7EDD" : "Deny";

  // Dynamic suggestion buttons
  suggestionsContainer.innerHTML = "";
  if (Array.isArray(data.suggestions)) {
    data.suggestions.forEach((s, i) => {
      const btn = document.createElement("button");
      btn.className = "btn-suggestion";
      btn.textContent = getSuggestionLabel(s, data.lang);
      btn.addEventListener("click", () => {
        disableAll();
        window.bubbleAPI.decide("suggestion:" + i);
      });
      suggestionsContainer.appendChild(btn);
    });
  }

  // Re-enable buttons
  btnAllow.disabled = false;
  btnDeny.disabled = false;

  card.classList.remove("hiding");
  card.classList.add("visible");
}

function hide() {
  card.classList.remove("visible");
  card.classList.add("hiding");
}

btnAllow.addEventListener("click", () => {
  btnAllow.textContent = "...";
  disableAll();
  window.bubbleAPI.decide("allow");
});

btnDeny.addEventListener("click", () => {
  btnDeny.textContent = "...";
  disableAll();
  window.bubbleAPI.decide("deny");
});

window.bubbleAPI.onPermissionShow(show);
window.bubbleAPI.onPermissionHide(hide);
</script>
</body>
</html>
