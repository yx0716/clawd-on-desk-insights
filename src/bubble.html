<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  user-select: none;
  font-family: "Courier New", monospace;
}

.bubble {
  position: absolute;
  top: 8px; left: 8px; right: 8px; bottom: 8px;
  background: #1a1a2e;
  border: 3px solid #e0e0e0;
  border-radius: 8px;
  padding: 12px 14px 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  opacity: 0;
  transform: scale(0.9) translateY(8px);
  transition: opacity 0.2s ease-out, transform 0.2s ease-out;
  image-rendering: pixelated;
}
.bubble.visible {
  opacity: 1;
  transform: scale(1) translateY(0);
}
.bubble.hiding {
  opacity: 0;
  transform: scale(0.9) translateY(8px);
}

/* Pixel tail pointing to bottom-right (toward pet) */
.tail {
  position: absolute;
  bottom: -8px; right: 24px;
  width: 0; height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 8px solid #e0e0e0;
}
.tail::after {
  content: "";
  position: absolute;
  top: -11px; left: -6px;
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 6px solid #1a1a2e;
}

.tool-header {
  display: flex;
  align-items: center;
  gap: 6px;
}
.tool-icon {
  font-size: 14px;
  width: 20px;
  text-align: center;
  flex-shrink: 0;
}
.tool-name {
  font-size: 13px;
  font-weight: bold;
  color: #7ec8e3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tool-detail {
  font-size: 11px;
  color: #b0b0c0;
  line-height: 1.3;
  max-height: 36px;
  overflow: hidden;
  word-break: break-all;
  border-left: 2px solid #3a3a5e;
  padding-left: 8px;
}

.actions {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 2px;
}

.btn {
  flex: 1;
  padding: 5px 0;
  border: 2px solid;
  border-radius: 4px;
  font-family: "Courier New", monospace;
  font-size: 12px;
  font-weight: bold;
  cursor: pointer;
  text-align: center;
  transition: filter 0.1s;
  image-rendering: pixelated;
}
.btn:hover { filter: brightness(1.2); }
.btn:active { filter: brightness(0.9); transform: translateY(1px); }

.btn-allow {
  background: #2d5a3d;
  border-color: #4ade80;
  color: #4ade80;
}
.btn-deny {
  background: #5a2d2d;
  border-color: #f87171;
  color: #f87171;
}

.timer {
  font-size: 10px;
  color: #808090;
  text-align: center;
  min-width: 30px;
  flex-shrink: 0;
}
</style>
</head>
<body>
<div class="bubble" id="bubble">
  <div class="tail"></div>
  <div class="tool-header">
    <span class="tool-icon" id="toolIcon"></span>
    <span class="tool-name" id="toolName"></span>
  </div>
  <div class="tool-detail" id="toolDetail"></div>
  <div class="actions">
    <button class="btn btn-allow" id="btnAllow">Allow</button>
    <span class="timer" id="timer"></span>
    <button class="btn btn-deny" id="btnDeny">Deny</button>
  </div>
</div>

<script>
const TOOL_ICONS = {
  Bash: ">_",
  Edit: "ED",
  Write: "WR",
  Read: "RD",
  Glob: "GL",
  Grep: "GR",
  Agent: "AG",
  NotebookEdit: "NB",
};

const bubble = document.getElementById("bubble");
const toolIcon = document.getElementById("toolIcon");
const toolName = document.getElementById("toolName");
const toolDetail = document.getElementById("toolDetail");
const timer = document.getElementById("timer");
const btnAllow = document.getElementById("btnAllow");
const btnDeny = document.getElementById("btnDeny");

let countdownInterval = null;
let remaining = 0;

function formatDetail(name, input) {
  if (!input || typeof input !== "object") return "";
  if (name === "Bash" && input.command) return truncate(input.command, 120);
  if ((name === "Edit" || name === "Write" || name === "Read") && input.file_path) return truncate(input.file_path, 120);
  if (name === "Glob" && input.pattern) return truncate(input.pattern, 120);
  if (name === "Grep" && input.pattern) return truncate(input.pattern, 120);
  // Fallback: show first string value
  for (const v of Object.values(input)) {
    if (typeof v === "string") return truncate(v, 100);
  }
  return truncate(JSON.stringify(input), 100);
}

function truncate(s, max) {
  if (s.length <= max) return s;
  return s.slice(0, max - 1) + "\u2026";
}

function show(data) {
  // All dynamic content set via textContent — never innerHTML
  toolIcon.textContent = TOOL_ICONS[data.toolName] || "??";
  toolName.textContent = data.toolName || "Unknown";
  toolDetail.textContent = formatDetail(data.toolName, data.toolInput);

  remaining = data.timeoutSec || 30;
  timer.textContent = remaining + "s";
  if (countdownInterval) clearInterval(countdownInterval);
  countdownInterval = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(countdownInterval);
      timer.textContent = "0s";
    } else {
      timer.textContent = remaining + "s";
    }
  }, 1000);

  // Update button labels based on language
  if (data.lang === "zh") {
    btnAllow.textContent = "\u2713 \u6279\u51C6";
    btnDeny.textContent = "\u2717 \u62D2\u7EDD";
  } else {
    btnAllow.textContent = "\u2713 Allow";
    btnDeny.textContent = "\u2717 Deny";
  }

  // Re-enable buttons (may have been disabled from previous request)
  btnAllow.disabled = false;
  btnDeny.disabled = false;

  bubble.classList.remove("hiding");
  bubble.classList.add("visible");
}

function hide() {
  if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
  bubble.classList.remove("visible");
  bubble.classList.add("hiding");
}

btnAllow.addEventListener("click", () => {
  window.bubbleAPI.decide("allow");
  btnAllow.disabled = true;
  btnDeny.disabled = true;
});

btnDeny.addEventListener("click", () => {
  window.bubbleAPI.decide("deny");
  btnAllow.disabled = true;
  btnDeny.disabled = true;
});

window.bubbleAPI.onPermissionShow(show);
window.bubbleAPI.onPermissionHide(hide);
</script>
</body>
</html>
